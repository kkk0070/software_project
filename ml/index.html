<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Map</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav>
        <div class="logo">MAP</div>
        <div class="nav-links">
            <a href="#">Safety</a>
            <a href="#" id="admin-toggle"><i class="fas fa-chart-line"></i> Admin Mode</a>
            <button class="btn-secondary">Log In</button>
        </div>
    </nav>

    <main>
        <section class="booking-container">
            <div class="card glass">
                <h1>Where to?</h1>
                <div class="input-group">
                    <label for="pickup"><i class="fas fa-circle-dot"></i></label>
                    <input type="text" id="pickup" placeholder="Current Location (e.g., 12.9716, 77.5946)"
                        autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="destination"><i class="fas fa-location-dot"></i></label>
                    <input type="text" id="destination" placeholder="Destination Location (e.g., 13.0827, 80.2707)"
                        autocomplete="off">
                </div>

                <div class="transport-selection">
                    <h3>Select Mode</h3>
                    <div class="modes">
                        <div class="mode-card active" data-mode="lux">
                            <i class="fas fa-car-side"></i>
                            <span>Lux</span>
                        </div>
                        <div class="mode-card" data-mode="eco">
                            <i class="fas fa-car"></i>
                            <span>Eco</span>
                        </div>
                        <div class="mode-card" data-mode="bike">
                            <i class="fas fa-motorcycle"></i>
                            <span>Bike</span>
                        </div>
                    </div>
                </div>

                <button id="book-btn" class="btn-primary">Book Now</button>

                <div id="results" class="results hidden">
                    <div class="divider"></div>
                    <div class="stat">
                        <span class="label">Distance</span>
                        <span id="distance-val" class="value">-- km</span>
                    </div>
                    <div class="stat">
                        <span class="label">Nearest Driver</span>
                        <span id="driver-val" class="value">Searching...</span>
                    </div>
                    <div class="stat">
                        <span class="label">ETA</span>
                        <span id="eta-val" class="value">-- mins</span>
                    </div>
                </div>

                <!-- Admin Dashboard Section -->
                <div id="admin-dashboard" class="results hidden">
                    <div class="divider"></div>
                    <h3>Optimization Dashboard</h3>
                    <div class="stat">
                        <span class="label">Predicted Peak Demand</span>
                        <span id="peak-demand-val" class="value">--</span>
                    </div>
                    <div class="stat">
                        <span class="label">Efficiency Score</span>
                        <span id="efficiency-val" class="value">--</span>
                    </div>
                    <div class="optimization-alerts" id="opt-alerts">
                        <!-- Relocation suggestions go here -->
                    </div>
                </div>
            </div>

            <div id="map" class="map-container glass"></div>
        </section>
    </main>

    <div id="toast" class="toast hidden">Booking Confirmed! Your driver is on the way.</div>

    <script src="script.js"></script>
</body>

</html>
