<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EcoRide - Authentication</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .ios-shadow {
            box-shadow: 0 4px 20px -2px rgba(19, 236, 91, 0.15);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white transition-colors duration-300">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-[430px] mx-auto shadow-2xl border-x border-slate-200 dark:border-slate-800">
<!-- TopAppBar -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-white/10 cursor-pointer">
<span class="material-symbols-outlined" data-icon="arrow_back" data-size="24px">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12 font-display">EcoRide</h2>
</div>
<!-- Header Image (Brand Graphic) -->
<div class="px-6 py-4">
<div class="w-full h-48 rounded-xl bg-gradient-to-br from-primary/20 via-background-dark to-primary/10 flex items-center justify-center relative overflow-hidden ios-shadow border border-primary/20" data-alt="Abstract neon green electric vehicle silhouettes moving through a futuristic eco-friendly city">
<div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-primary text-7xl mb-2 drop-shadow-[0_0_10px_rgba(19,236,91,0.5)]">ev_station</span>
<div class="h-1 w-16 bg-primary rounded-full"></div>
</div>
</div>
</div>
<!-- Headline & Body -->
<div class="px-6 space-y-2">
<h1 class="text-slate-900 dark:text-white tracking-tight text-3xl font-bold leading-tight font-display">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-relaxed max-w-[80%]">Sign in to continue your journey with sustainable mobility.</p>
</div>
<!-- Role Selection (Segmented Buttons) -->
<div class="px-6 mt-8">
<p class="text-[10px] uppercase tracking-[0.2em] font-bold text-primary mb-3 px-1">Choose your role</p>
<div class="flex h-12 w-full items-center justify-center rounded-full bg-slate-200 dark:bg-white/5 p-1.5">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-2 transition-all has-[:checked]:bg-primary has-[:checked]:text-black text-slate-500 dark:text-slate-400 text-sm font-bold font-display">
<span class="truncate">RIDER</span>
<input checked="" class="invisible w-0" name="role-toggle" type="radio" value="Rider"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-2 transition-all has-[:checked]:bg-primary has-[:checked]:text-black text-slate-500 dark:text-slate-400 text-sm font-bold font-display">
<span class="truncate">DRIVER</span>
<input class="invisible w-0" name="role-toggle" type="radio" value="Driver"/>
</label>
</div>
</div>
<!-- Authentication Form -->
<div class="px-6 mt-8 space-y-4">
<div class="space-y-1.5">
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-slate-100 dark:bg-white/5 border-none rounded-full text-slate-900 dark:text-white placeholder:text-slate-500 focus:ring-2 focus:ring-primary/50 transition-all font-display" placeholder="Email Address" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-slate-100 dark:bg-white/5 border-none rounded-full text-slate-900 dark:text-white placeholder:text-slate-500 focus:ring-2 focus:ring-primary/50 transition-all font-display" placeholder="Password" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg cursor-pointer">visibility</span>
</div>
</div>
<div class="flex justify-end px-2">
<button class="text-primary text-xs font-bold hover:underline transition-all">Forgot Password?</button>
</div>
<button class="w-full h-14 bg-primary text-black font-bold text-lg rounded-full flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all ios-shadow font-display mt-4">
                Sign In
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Divider -->
<div class="px-6 py-8 flex items-center gap-4">
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-white/10"></div>
<span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Social login</span>
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-white/10"></div>
</div>
<!-- Social Login Stack -->
<div class="px-6 space-y-3 pb-12">
<button class="w-full h-14 border border-slate-300 dark:border-white/10 rounded-full flex items-center justify-center gap-3 bg-white dark:bg-transparent text-slate-900 dark:text-white hover:bg-slate-50 dark:hover:bg-white/5 transition-all font-display">
<img alt="Apple" class="w-5 h-5 dark:invert" data-alt="Official Apple logo in minimalist style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCaGAXqyV4ZdHxn5t_CxO_0v1o4YQOgCqqgWhOhTPIvrhr3HhHFags4m9Ulx-4gV8x8AZX2Odoc41-ezks08gotB_6xD-JSURRetl-dY-UD1uE_36iVJJ55HpS5BtDh5W13nv02Pd7iBY-4X8n_lscvVqXsoeb-YJotKu4Q2n7RCqUJwcSdMqOo9w2gGG3fzK3DjjAZJDxjm4ZJ4fsnVGzzXMy_NTXlrN5pJkRPaKWPpMv2RuI4EuaA-uPFNvp2a2NIAGpCGkm0M2E5"/>
<span class="font-medium">Continue with Apple</span>
</button>
<button class="w-full h-14 border border-slate-300 dark:border-white/10 rounded-full flex items-center justify-center gap-3 bg-white dark:bg-transparent text-slate-900 dark:text-white hover:bg-slate-50 dark:hover:bg-white/5 transition-all font-display">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-medium">Continue with Google</span>
</button>
</div>
<!-- Footer -->
<div class="mt-auto pb-8 text-center px-6">
<p class="text-sm text-slate-500 dark:text-slate-400">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Sign up now</a>
</p>
</div>
<!-- iOS Home Indicator -->
<div class="flex justify-center pb-2">
<div class="w-32 h-1 bg-slate-300 dark:bg-white/20 rounded-full"></div>
</div>
</div>
</body></html>
