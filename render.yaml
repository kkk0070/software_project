databases:
  - name: ecoride-db
    databaseName: ecoride_db
    plan: free

services:

  # Express Backend
  - type: web
    name: ecoride-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecoride-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  # Admin Dashboard (Vite Static Site)
  - type: web
    name: ecoride-admin
    runtime: static
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ecoride-backend
          property: url

  # Flutter Web App
  - type: web
    name: ecoride-app
    env: docker
    plan: free
    dockerfilePath: Dockerfile.web
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: ecoride-backend
          property: url
